<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartQueue - หน้าแรก</title>
    <link href="./css/output.css" rel="stylesheet">
    <link href="./css/input.css" rel="stylesheet">
  </head>
  <body
    class="font-[kanit]"
    style="
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
        url(&quot;https://shabuku.co.th/wp-content/uploads/2023/08/Shabuku.jpg&quot;);
      background-size: cover;
      background-attachment: fixed;
    "
  >
    <nav class="bg-white/95 backdrop-blur shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
      <h1 class="text-[36px] font-bold text-blue-600">ระบบจองคิว</h1>
      <div class="space-x-4">
        <a href="index.html" class="text-gray-600 hover:text-blue-600 font-medium transition-colors">หน้าแรก</a>
        <a href="login.html" class="bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition-colors hover:bg-blue-700 hover:text-gray-100">เข้าสู่ระบบสำหรับแอดมิน</a>
      </div>
    </nav>

    <main class="min-h-[calc(100vh-88px)] flex flex-col items-center justify-center p-6 gap-8">
      
      <div
        class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl w-full max-w-4xl border border-white/50 overflow-hidden relative"
      >
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-cyan-400"></div>

        <div class="p-10 grid grid-cols-1 md:grid-cols-2 gap-8 divide-y md:divide-y-0 md:divide-x divide-gray-200">
          <div class="flex flex-col items-center justify-center p-4">
            <h2 class="text-gray-500 uppercase tracking-widest text-sm font-bold mb-2">
              Now Serving
            </h2>
            <div
              id="current-queue"
              class="text-[120px] leading-none font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-600 to-blue-400 drop-shadow-sm"
            >
              000
            </div>
            <p class="text-gray-400 mt-2">คิวที่กำลังให้บริการ</p>
          </div>

          <div class="flex flex-col items-center justify-center p-4 space-y-6">
            <div class="flex flex-col items-center justify-center p-4 w-full">
              <h2 class="text-gray-500 uppercase tracking-widest text-sm font-bold mb-2">
                Waiting in Queue
              </h2>
              <div
                id="remaining-queue"
                class="text-[120px] md:text-[150px] leading-none font-black text-slate-900 drop-shadow-md opacity-100"
              >
                000
              </div>
              <p id="remaining-queue-text" class="text-gray-400 mt-2 font-medium">คิวรอทั้งหมด / คิวก่อนหน้าคุณ</p>
            </div>

            <div id="my-queue-section" class="hidden flex flex-col items-center justify-center p-6 bg-gradient-to-br from-yellow-50 to-orange-50 border-t md:border-t-0 border-dashed border-2 border-orange-300 transition-all duration-500 w-full rounded-3xl shadow-lg">
              <div id="my-ticket-info" class="text-center w-full bg-white rounded-2xl p-6 border-4 border-dashed border-orange-400 shadow-md">
                <h2 class="text-orange-700 font-bold text-sm uppercase tracking-wider mb-3 font-mono">
                  🎫 บัตรคิวของคุณ 🎫
                </h2>
                <div class="border-b-2 border-dashed border-orange-300 py-3 mb-3">
                  <div
                    id="my-queue-number"
                    class="text-8xl md:text-9xl font-black text-orange-600 drop-shadow-lg font-mono"
                  >
                    000
                  </div>
                </div>
                <p class="text-orange-600 font-bold font-mono text-xs mb-2">กรุณาเตรียมตัวที่เคาน์เตอร์</p>
                <p class="text-gray-500 text-xs font-mono">SmartQueue System</p>
              </div>

              <button id="reserve-cancel-btn" onclick="cancelMyQueue()" class="hidden bg-red-500 text-white hover:bg-red-600 font-bold py-2 px-6 rounded-full shadow-md transition-all text-sm mt-4">
                ยกเลิกการจอง
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="reserve-area" class="md:static fixed bottom-4 left-1/2 transform -translate-x-1/2 w-[92%] md:w-auto z-50 flex items-center justify-center">
        <a id="reserve-link" href="reserve.html" class="group relative inline-flex items-center justify-center w-full md:w-auto px-6 md:px-10 py-4 font-bold text-white transition-all duration-200 bg-gradient-to-r from-blue-600 to-blue-500 font-kanit rounded-2xl focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 hover:from-blue-700 hover:to-blue-600 shadow-xl hover:shadow-blue-500/40 transform md:hover:-translate-y-1 active:scale-95">
          <span class="text-2xl mr-3">จองคิวทันที</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
          </svg>
        </a>
      </div>
      
    </main>
  </body>
  
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="./js/index.js"></script>
</html>
