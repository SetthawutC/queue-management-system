<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login </title>
    <link href="./src/output.css" rel="stylesheet">

    
  </head>
  <body class="font-[kanit]" style="background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://shabuku.co.th/wp-content/uploads/2023/08/Shabuku.jpg'); 
background-size: cover; 
background-attachment: fixed;">
    <header>
      <nav class="bg-white/95 backdrop-blur shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-[36px] font-bold text-blue-600">ระบบจองคิว</h1>
        <div class="space-x-4">
          <a href="index.html" class="text-gray-600 hover:text-blue-600 font-medium transition-colors mr-4 ">กลับไปหน้าแรก</a>
    
        
        </div>
      </nav>
    </header>
    <main class="min-h-[calc(100vh-88px)] flex items-center justify-center p-4">
        <div class="bg-white/95 backdrop-blur-md p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-white/50 transform transition-all">
            <div class="text-center mb-8">
                <div class="inline-block p-3 rounded-full bg-blue-100 text-blue-600 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">เข้าสู่ระบบ</h1>
                <p class="text-gray-500 mt-2">สำหรับผู้ดูแลระบบเท่านั้น</p>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1 ml-1">ชื่อผู้ใช้</label>
                    <input type="text" id="username" placeholder="Username" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-gray-800 placeholder-gray-400" required>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1 ml-1">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-gray-800 placeholder-gray-400" required>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-blue-500/40 transform hover:-translate-y-0.5 transition-all active:scale-95 text-lg mt-4">เข้าสู่ระบบ</button>
            </form>
        </div>
    </main>
    <script>
      const adminData = {
        "username": "admin",
        "password": "admin1234"
      }
      const loginForm = document.getElementById("loginForm");
      loginForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        if (username === adminData.username && password === adminData.password) {
          window.location.href = "management.html";
        } else {
          alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
        }
      });

    </script>
  </body>
</html>
